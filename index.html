<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Central Altitude</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  display: flex;
  background: #EEF2F7;
  color: #1E293B;
}

/* SIDEBAR */
.sidebar {
  width: 230px;
  height: 100vh;
  background: #EEF2F7;
  border-right: 1.5px solid #E2E8F0;
  box-shadow: 2px 0 12px rgba(0,0,0,0.05);
  padding: 20px;
}

/* LOGO */
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 30px;
}

.logo-box {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg,#334155,#64748B);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
}

.logo-text {
  font-weight: 800;
  font-size: 15px;
}

.logo-sub {
  font-size: 10px;
  color: #64748B;
  text-transform: uppercase;
}

/* MENU */
.menu li {
  list-style: none;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 8px;
  transition: 0.2s;
}

.menu li:hover {
  background: rgba(51,65,85,0.08);
}

/* MAIN */
.main {
  flex: 1;
  padding: 40px;
}

/* HEADER */
.header h1 {
  font-size: 22px;
  margin-bottom: 25px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border: 1.5px solid #E2E8F0;
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-4px);
  border-color: #334155;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

.card h3 {
  margin-bottom: 8px;
}

.card p {
  font-size: 14px;
  color: #64748B;
}

.tag {
  margin-top: 10px;
  display: inline-block;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(100,116,139,0.15);
  color: #334155;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="logo">
    <div class="logo-box">ALT</div>
    <div>
      <div class="logo-text">Altitude</div>
      <div class="logo-sub">Central</div>
    </div>
  </div>

  <ul class="menu">
    <li onclick="scrollTopPage()">Dashboard</li>
    <li onclick="scrollTopPage()">Sistemas</li>
  </ul>

</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h1>Central de Sistemas</h1>
  </div>

  <div class="cards">

    <div class="card" onclick="abrirSistema('https://altitudetopo.vercel.app/')">
      <h3>Geocontrol</h3>
      <p>Gestão de topografia</p>
      <span class="tag">Topografia</span>
    </div>

    <div class="card" onclick="abrirSistema('https://rhaltitude.vercel.app/')">
      <h3>RHControl</h3>
      <p>Gestão de equipe</p>
      <span class="tag">RH</span>
    </div>

    <div class="card">
      <h3>Novo sistema</h3>
      <p>Em desenvolvimento</p>
      <span class="tag">Em breve</span>
    </div>

  </div>

</div>

<script>
function abrirSistema(url) {
  window.open(url, '_blank');
}

function scrollTopPage() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

</body>
</html>
