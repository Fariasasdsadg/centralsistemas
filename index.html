<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Central de Sistemas</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial;
}

body {
  display: flex;
  background: #0f172a;
  color: #e2e8f0;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #020617;
  padding: 25px 20px;
}

.sidebar h2 {
  margin-bottom: 40px;
  font-size: 20px;
}

.sidebar ul {
  list-style: none;
}

.sidebar li {
  margin: 18px 0;
  cursor: pointer;
  opacity: 0.7;
  transition: 0.2s;
}

.sidebar li:hover {
  opacity: 1;
}

/* MAIN */
.main {
  flex: 1;
  padding: 40px;
}

/* TITULO */
.header {
  margin-bottom: 30px;
}

.header h1 {
  font-size: 26px;
  font-weight: 500;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 25px;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.25s;
  border: 1px solid transparent;
}

.card:hover {
  transform: translateY(-4px);
  border: 1px solid #38bdf8;
  background: #1e293b;
}

.card h3 {
  margin-bottom: 10px;
  font-size: 18px;
}

.card p {
  font-size: 14px;
  opacity: 0.7;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Altitude</h2>
  <ul>
    <li onclick="mostrarDashboard()">🏠 Dashboard</li>
    <li onclick="mostrarSistemas()">📊 Sistemas</li>
  </ul>
</div>

<!-- MAIN -->
<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="header">
      <h1>Central de Sistemas</h1>
    </div>

    <div class="cards">

      <div class="card" onclick="abrirSistema('https://altitudetopo.vercel.app/')">
        <h3>📊 Geocontrol</h3>
        <p>Sistema de Topografia</p>
      </div>

      <div class="card" onclick="abrirSistema('https://rhaltitude.vercel.app/')">
        <h3>👷 RHControl</h3>
        <p>Gestão de RH</p>
      </div>

      <div class="card">
        <h3>➕ Novo Sistema</h3>
        <p>Em breve</p>
      </div>

    </div>
  </div>

</div>

<script>
function abrirSistema(url) {
  window.open(url, '_blank');
}

function mostrarDashboard() {
  document.getElementById("dashboard").style.display = "block";
}

function mostrarSistemas() {
  document.getElementById("dashboard").style.display = "block";
}
</script>

</body>
</html>
