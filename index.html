<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Central Altitude</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  display: flex;
  background: #EEF2F7;
  color: #1E293B;
}

/* SIDEBAR */
.sidebar {
  width: 230px;
  height: 100vh;
  background: #EEF2F7;
  border-right: 1px solid #E2E8F0;
  padding: 20px;
}

.logo {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
}

.logo-box {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg,#334155,#64748B);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
}

/* MENU */
.menu li {
  list-style: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.menu li:hover {
  background: rgba(51,65,85,0.08);
}

.menu li.active {
  background: rgba(51,65,85,0.15);
}

/* MAIN */
.main {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* TELAS */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  padding: 40px;
  transition: all 0.35s ease;
}

.hidden {
  opacity: 0;
  transform: translateX(40px);
  pointer-events: none;
}

.visible {
  opacity: 1;
  transform: translateX(0);
}

/* 🔥 MARCA D'ÁGUA COM ANIMAÇÃO */
.watermark {
  position: absolute;
  width: 500px;
  height: 500px;
  background: url('logo.png') no-repeat center;
  background-size: contain;
  opacity: 0.035;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  animation: respirar 6s ease-in-out infinite;
}

/* ANIMAÇÃO SUAVE */
@keyframes respirar {
  0% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.03;
  }
  50% {
    transform: translate(-50%, -50%) scale(1.03);
    opacity: 0.05;
  }
  100% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.03;
  }
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  position: relative;
  z-index: 1;
}

.card {
  background: white;
  border: 1px solid #E2E8F0;
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-6px);
  border-color: #334155;
  box-shadow: 0 10px 25px rgba(0,0,0,0.06);
}

.card:active {
  transform: scale(0.97);
}

/* IFRAME */
.iframe-container {
  height: calc(100vh - 80px);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 10px;
}

/* BOTÃO VOLTAR */
.back-btn {
  margin-bottom: 15px;
  padding: 8px 14px;
  border: none;
  border-radius: 8px;
  background: #334155;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.back-btn:hover {
  background: #1E293B;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <div class="logo-box">ALT</div>
    <div>
      <strong>Altitude</strong><br>
      <small>Central</small>
    </div>
  </div>

  <ul class="menu">
    <li class="active" onclick="mostrarDashboard(this)">Dashboard</li>
  </ul>
</div>

<!-- MAIN -->
<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard" class="screen visible">

    <div class="watermark"></div>

    <h1 style="position: relative; z-index: 1;">Central de Sistemas</h1>
    <br>

    <div class="cards">

      <div class="card" onclick="abrirSistema('https://altitudetopo.vercel.app/')">
        <h3>Geocontrol</h3>
        <p>Gestão de topografia</p>
      </div>

      <div class="card" onclick="abrirSistema('https://rhaltitude.vercel.app/')">
        <h3>RHControl</h3>
        <p>Gestão de equipe</p>
      </div>

    </div>

  </div>

  <!-- SISTEMA -->
  <div id="sistema" class="screen hidden">

    <button class="back-btn" onclick="voltar()">← Voltar</button>

    <div class="iframe-container">
      <iframe id="frame"></iframe>
    </div>

  </div>

</div>

<script>
function abrirSistema(url) {
  const frame = document.getElementById("frame");
  frame.src = url;

  document.getElementById("dashboard").classList.remove("visible");
  document.getElementById("dashboard").classList.add("hidden");

  document.getElementById("sistema").classList.remove("hidden");
  document.getElementById("sistema").classList.add("visible");
}

function voltar() {
  document.getElementById("frame").src = "";

  document.getElementById("sistema").classList.remove("visible");
  document.getElementById("sistema").classList.add("hidden");

  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("dashboard").classList.add("visible");
}

function mostrarDashboard(el) {
  document.querySelectorAll('.menu li').forEach(li => li.classList.remove('active'));
  el.classList.add('active');
  voltar();
}
</script>

</body>
</html>
